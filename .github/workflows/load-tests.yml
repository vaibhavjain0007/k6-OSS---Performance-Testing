# .github/workflows/load-tests.yml - GitHub Actions workflow for k6 load testing
# This workflow demonstrates CI/CD integration with k6 for automated performance testing

# Workflow triggers: Define when this workflow runs
# on: Specifies the events that trigger the workflow
# push: Runs on every push to main/master branch
# pull_request: Runs on pull requests targeting main/master
name: Load Testing with k6

on:
  push:
    branches: [ main, master ]  # Trigger on pushes to main branches
  pull_request:
    branches: [ main, master ]  # Trigger on PRs to main branches
  workflow_dispatch:            # Allow manual triggering from GitHub UI

# Jobs: Define the jobs that run in this workflow
# Each job runs on a separate virtual machine
jobs:
  # Job name: Descriptive identifier for the job
  load-test:
    # Runner: Specify the operating system for the job
    # ubuntu-latest: Use the latest Ubuntu runner (free tier)
    runs-on: ubuntu-latest

    # Steps: Sequence of tasks to execute in this job
    steps:
      # Step 1: Checkout code - Get the repository code
      # uses: Use a pre-built action from GitHub Marketplace
      # actions/checkout: Official action to clone the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up k6 - Install k6 on the runner
      # Install k6 using apt package manager (Ubuntu-based runners)
      # This ensures k6 is available for the load test execution
      # - name: Set up k6
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y k6
      - name: Set up k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg ca-certificates

          curl -fsSL https://dl.k6.io/key.gpg | \
          sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg

          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | \
          sudo tee /etc/apt/sources.list.d/k6.list

          sudo apt-get update
          sudo apt-get install -y k6

      # Step 3: Create reports directory - Ensure output directory exists
      # Note: Although the reports/ folder exists in the repository, we create it here as a best practice
      # Reasons:
      # 1. CI/CD environments start with a fresh clone - defensive programming
      # 2. Ensures directory exists if someone removes it from the repo later
      # 3. mkdir -p is idempotent (doesn't fail if directory already exists)
      # 4. Standard practice in production workflows for reliability
      - name: Create reports directory
        run: mkdir -p reports

      # Step 4: Run load test - Execute the k6 test script
      # This runs the k6 test which:
      # - Executes the test scenarios defined in tests/load-test.js
      # - Outputs metrics in JSON format (--out json=reports/results.json)
      # - Exports a summary JSON (--summary-export=reports/summary.json)
      # - Also generates an HTML report via handleSummary() in the test script
      #   The HTML report (reports/summary.html) is created automatically and captured in the next step
      - name: Run load test
        run: |
          k6 run \
            --out json=reports/results.json \
            --summary-export=reports/summary.json \
            tests/load-test.js

      # Step 5: Upload test results - Archive and upload artifacts
      # uses: Use actions/upload-artifact to save files
      # if: Conditional execution - only if previous step succeeded
      # Note: The upload-artifact step captures all files in reports/, including:
      # - reports/results.json (detailed metrics from --out flag)
      # - reports/summary.json (test summary from --summary-export flag)
      # - reports/summary.html (HTML report generated by handleSummary() in load-test.js)
      # All reports are available for download from GitHub Actions UI for 90 days
      - name: Upload test results
        if: success() || failure()  # Upload even if test fails
        uses: actions/upload-artifact@v4
        with:
          name: k6-test-results-${{ github.run_number }}  # Unique name with run number
          path: |
            reports/
            !reports/*.tmp         # Exclude temporary files (if any)

      # Step: Deploy report to GitHub Pages
      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports

      # Step: Print report URL
      - name: Report URL
        run: |
          echo "Report available at:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      # Step 6: Check test results - Validate test outcomes
      # run: Execute script to check if test passed
      # Use k6 exit codes: 0=pass, 99=threshold failure
      - name: Check test results
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Load test passed!"
          elif [ $? -eq 99 ]; then
            echo "❌ Load test failed due to threshold violations"
            exit 1
          else
            echo "⚠️ Load test encountered an error"
            exit 1
          fi

      # Step 7: Comment on PR (optional) - Add test results to PR
      # uses: Use action to comment on pull requests
      # if: Only run on pull requests
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('reports/summary.json', 'utf8'));

            const comment = `
            ## 🚀 Load Test Results

            **Test Summary:**
            - Duration: ${summary.metrics.iteration_duration.values.avg}ms avg
            - Total Requests: ${summary.metrics.http_reqs.values.count}
            - Failed Requests: ${summary.metrics.http_req_failed.values.rate * 100}%

            **Response Times:**
            - 95th percentile: ${summary.metrics.http_req_duration.values['p(95)']}ms
            - 99th percentile: ${summary.metrics.http_req_duration.values['p(99)']}ms

            📊 [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

# Workflow configuration notes:
# - This workflow runs on every push/PR to demonstrate CI integration
# - In production, you might want to run less frequently or on specific triggers
# - The workflow uses Ubuntu runners which provide good performance for k6
# - Artifacts are retained for 90 days by default
# - The PR comment feature requires the workflow to have proper permissions
# - Three report formats are generated: JSON (raw), summary JSON, and HTML (via load-test.js)